services:
  - type: web
    name: csrf-scanner
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /api/v1/health
    plan: starter